<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>맛있조 - 글 상세보기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #fffaf5;
      color: #333;
    }

    /* 레이아웃 */
    .container {
      display: flex;
      justify-content: center; /* 중앙 정렬 추가 */
      min-height: 100vh;
    }

    /* 본문 영역 */
    main {
      padding: 40px 30px;
      flex-grow: 1;
      display: flex;
      justify-content: center;
    }

    /* 후기 및 댓글 영역을 감싸 중앙 정렬 */
    .content-wrapper {
      max-width: 900px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #ff725e;
      text-align: center;
    }
    .post-meta {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 25px;
        text-align: right;
        max-width: 900px;
        margin-left: auto;
    }
    .post-content {
      font-size: 1.1rem;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      white-space: pre-wrap;
    }
    .post-image {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 30px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* 댓글 리스트 */
    .comment-list {
      list-style: none;
      margin-bottom: 35px;
    }
    .comment-list li {
      background: #fff0eb;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 15px;
      color: #5a2f23;
      font-size: 1rem;
      white-space: pre-wrap;
    }
    .comment-nick {
      font-weight: 700;
      color: #ff725e;
      margin-bottom: 6px;
      display: block;
      font-size: 0.95rem;
    }
    .comment-text {
      white-space: normal;
      line-height: 1.3;
    }

    /* 댓글 입력 폼 */
    .comment-form {
      border: 1.5px solid #ffab99;
      padding: 20px;
      border-radius: 12px;
      background: white;
      box-sizing: border-box;
    }
    .comment-form input[type="text"],
    .comment-form textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #ffab99;
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 20px;
      transition: border-color 0.3s ease;
      box-sizing: border-box;
    }
    .comment-form input[type="text"]:focus,
    .comment-form textarea:focus {
      border-color: #ff4f3d;
      outline: none;
    }
    .comment-form button {
      background-color: #ff725e;
      border: none;
      color: white;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      float: right;
      margin-top: 10px;
    }
    .comment-form button:hover {
      background-color: #e55a44;
    }
    .clearfix::after {
      content: "";
      display: block;
      clear: both;
    }
  </style>
</head>
<body>
  <div class="container">
    <main>
      <div class="content-wrapper">
        <h1>홍대 돈까스 맛집 후기</h1>
        <div class="post-meta">
          작성자: 맛돌이 | 조회수: 152
        </div>
        <img
          src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=800&q=80"
          alt="맛집 이미지"
          class="post-image"
        />
        <div class="post-content">
          맛있게 먹고 왔습니다! 돈까스가 바삭하고 육즙이 장난 아니고 고기가 정말 부드러워요!! 추천합니다!
        </div>

        <ul class="comment-list">
          <li>
            <span class="comment-nick">행복한식객</span>
            <span class="comment-text">정말 맛있어 보이네요! 다음에 꼭 가봐야겠어요.</span>
          </li>
          <li>
            <span class="comment-nick">먹스타그램러</span>
            <span class="comment-text">사진만 봐도 군침 돕니다 ㅎㅎ 좋은 정보 감사해요.</span>
          </li>
          <li>
            <span class="comment-nick">돈까스매니아</span>
            <span class="comment-text">요즘 핫하다고 하던데, 기대되네요!</span>
          </li>
        </ul>

        <form class="comment-form clearfix" onsubmit="return false;">
          <input type="text" placeholder="닉네임" required />
          <textarea rows="4" placeholder="댓글을 입력하세요..." required></textarea>
          <button type="submit">댓글 등록</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.querySelector('.comment-form');
    const commentList = document.querySelector('.comment-list');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const nick = form.querySelector('input[type="text"]').value.trim();
      const content = form.querySelector('textarea').value.trim();

      if (!nick || !content) return alert('닉네임과 댓글을 모두 입력해주세요.');

      const newComment = document.createElement('li');
      const nickSpan = document.createElement('span');
      nickSpan.classList.add('comment-nick');
      nickSpan.textContent = nick;

      const contentSpan = document.createElement('span');
      contentSpan.classList.add('comment-text');
      contentSpan.textContent = content;

      newComment.appendChild(nickSpan);
      newComment.appendChild(contentSpan);

      commentList.appendChild(newComment);
      form.reset();
    });
  </script>
</body>
</html>
