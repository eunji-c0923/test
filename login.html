<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>맛있조 - 로그인</title>
  <style>
    /* 기존 디자인 스타일 유지 + 로그인폼 스타일 추가 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fffaf5;
      color: #333;
      font-size: 0.8rem;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .login-box {
      background: #fff0eb;
      padding: 40px 32px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .login-box h2 {
      color: #ff725e;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 1.6rem;
    }
    .login-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #ff725e;
      font-size: 0.9rem;
    }
    .login-box input[type="text"],
    .login-box input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ff725e;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .login-box input[type="text"]:focus,
    .login-box input[type="password"]:focus {
      border-color: #e05a45;
    }
    .login-box button {
      width: 100%;
      background: #ff725e;
      border: none;
      padding: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .login-box button:hover {
      background: #e05a45;
    }
    .login-box .signup-link {
      margin-top: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #ff725e;
    }
    .login-box .signup-link a {
      color: #e05a45;
      text-decoration: none;
      font-weight: 700;
    }
    .login-box .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <div class="login-box">
      <h2>로그인</h2>
      <form id="loginForm" onsubmit="return loginSubmit()">
        <label for="userid">아이디</label>
        <input type="text" id="userid" name="userid" placeholder="아이디를 입력하세요" required />
        
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
        
        <button type="submit">로그인</button>
      </form>
      <div class="signup-link">
        아직 회원이 아니신가요? <a href="register.html">회원가입</a>
      </div>
    </div>
  </main>

  <script>
    function loginSubmit() {
      const id = document.getElementById('userid').value.trim();
      const pw = document.getElementById('password').value.trim();
      if (id === '' || pw === '') {
        alert('아이디와 비밀번호를 모두 입력해주세요.');
        return false;
      }
      alert(`로그인 시도: 아이디=${id}, 비밀번호=${'*'.repeat(pw.length)}`);
      // 여기에 실제 로그인 처리 로직 추가
      return false; // 폼 제출 방지(테스트용)
    }
  </script>
</body>
</html>
